<html>
 <head>
   <script src="https://aframe.io/releases/1.0.6/aframe.min.js"></script>
 </head>
 <body>
   <a-scene>
     <a-assets>
       <img id="sky" src="nightsky.jpg">
       <img id="dog" src="cursordog.jpg">
       <!-- Add asset here -->
       <a-asset-item
         id="restaurant"
         src="spongebob_hamburger_restaurant.glb"></a-asset-item>
     </a-assets>


     <a-sky src="#sky"></a-sky>
     <a-plane
       src="#dog"
       rotation="-90 0 0"
       width="20"
       height="20"></a-plane>
     <a-text
       value="Hello!"
       color="#3B23EB"
       align="center"
       position="0 3 -4"></a-text>
     <!-- Add entity here: -->
     <a-glb-model
       src="#restaurant"
       position="0 2 -4"
       scale="0.5 0.5 0.5"></a-glb-model>
   </a-scene>
 </body>
</html>
