<!DOCTYPE html>
<html>

 <body>

      <a-plane width="10" height="15" position="0 -2 -10" color="#AAAAAA" rotation="-90 0 0"></a-plane>

     <a-light color="blue" position="0 5 -3"></a-light>

    </a-scene>
